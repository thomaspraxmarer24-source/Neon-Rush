  if(!skinDefs.some(s=>s.id===selectedSkin&&completedLevel>=s.level))selectedSkin='diddler';

  function saveProgress(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({version:2,completed:completedLevel,unlocked,selected:selectedSkin,lastLevel:levelId}));localStorage.setItem(LEGACY_KEY,String(unlocked))}catch(e){}}

  function drawMenu(){background(levelId);text('GEOMETRY',W/2,H*.20,Math.min(72,W*.075),'#56efff','center');text('DIDDLER',W/2,H*.285,Math.min(72,W*.075),'#f95aff','center');text('12 TRIALS',W/2,H*.335,14,'#ffe957','center',true);const m=mainButtons();button(m.start.x,m.start.y,m.start.w,m.start.h,`LEVEL ${levelId} STARTEN`);button(m.skins.x,m.skins.y,m.skins.w,m.skins.h,'SKINS');text('LEVEL-AUSWAHL',W/2,H*.535,12,'#b9f7ff','center',true);const cellW=Math.min(116,W*.135),gap=10,left=(W-(cellW*6+gap*5))/2;for(let n=0;n<12;n++){const col=n%6,row=Math.floor(n/6),x=left+col*(cellW+gap),y=H*.56+row*82,ok=n+1<=unlocked;rect(x,y,cellW,67,ok?'#1d0b3c':'#130b23',n+1===levelId?'#ffe957':ok?'#7650b7':'#42334b');text(String(n+1).padStart(2,'0'),x+cellW/2,y+29,19,ok?'#58f3ff':'#685a70','center');text(ok?ratings[n]:'LOCKED',x+cellW/2,y+51,9,ok?'#d6c4ef':'#685a70','center')}text('FORTSCHRITT '+completedLevel+'/12 · BUILD 1.7',W/2,H-48,9,'#775c97','center',true);text('TIPPE, UM ZU SPRINGEN',W/2,H-24,11,'#b8a8cb','center',true)}
  function drawSkins(){background(levelId);text('SKINS',W/2,H*.13,Math.min(46,W*.055),'#ffe957','center');text('WÄHLE DEIN QUADRAT',W/2,H*.185,11,'#b9f7ff','center',true);button(18,16,130,50,'ZURÜCK');const l=skinLayout();for(let i=0;i<skinDefs.length;i++){const s=skinDefs[i],col=i%3,row=Math.floor(i/3),x=l.left+col*(l.cardW+l.gap),y=l.top+row*(l.cardH+l.rowGap),ok=isSkinUnlocked(s),selected=ok&&s.id===selectedSkin;rect(x,y,l.cardW,l.cardH,selected?'#32145a':ok?'#1d0b3c':'#100b1c',selected?'#ffe957':ok?'#7650b7':'#403348',selected?4:2);const size=Math.min(74,l.cardH*.49),px=x+(l.cardW-size)/2,py=y+Math.max(8,l.cardH*.07);if(ok){ctx.save();ctx.shadowColor=s.glow;ctx.shadowBlur=selected?15:6;drawSkin(s,px,py,size);ctx.restore()}else{rect(px,py,size,size,'#09070e','#45394f',2);text('?',px+size/2,py+size*.68,Math.min(34,size*.5),'#5d5264','center',true)}text(ok?s.name:'GESPERRT',x+l.cardW/2,y+l.cardH*.75,Math.min(13,l.cardH*.11),ok?'#fff':'#6d6273','center',true);const status=selected?'AUSGEWÄHLT':ok?'ANTIPPEN':`LEVEL ${s.level} ABSCHLIESSEN`;text(status,x+l.cardW/2,y+l.cardH*.91,Math.min(9,l.cardH*.075),selected?'#ffe957':ok?'#83f6ff':'#6d6273','center',true)}}
  function drawUnlockToast(){if(!unlockToast)return;if(performance.now()>unlockToast.until){unlockToast=null;return}const s=unlockToast.skin,w=Math.min(330,W*.48),h=82,x=18,y=18;ctx.save();ctx.globalAlpha=.97;rect(x,y,w,h,'#140525','#ffe957',3);ctx.shadowColor=s.glow;ctx.shadowBlur=12;drawSkin(s,x+12,y+12,58);ctx.shadowBlur=0;text('NEUER SKIN!',x+82,y+31,13,'#ffe957','left',true);text(s.name+' FREIGESCHALTET',x+82,y+58,Math.min(15,w*.05),'#fff','left');ctx.restore()}
  function update(dt){if(!run||screen!=='run'||run.paused)return;if(run.dead){run.dead-=dt;if(run.dead<=0)start(run.id);return}if(run.complete)return;run.ground=H-88;const prevY=run.y,prevBottom=prevY+run.size/2;run.vy+=1740*dt;run.y+=run.vy*dt;run.x+=(250+(run.id-1)*18)*dt;run.camera=Math.max(0,run.x-155);run.grounded=false;let landing=run.ground-run.size/2;

  function drawRun(){background(run.id,run.camera);const neon=hue(run.id),g=run.ground,c=run.camera;rect(0,g,W,H-g,'#0d081d');ctx.strokeStyle=neon;ctx.globalAlpha=.75;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,g);ctx.lineTo(W,g);ctx.stroke();ctx.globalAlpha=1;
